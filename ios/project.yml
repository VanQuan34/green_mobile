name: GreenMobile
options:
  bundleIdPrefix: com.reactnative.app
targets:
  GreenMobile:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/GreenMobile
    settings:
      base:
        INFOPLIST_FILE: Sources/GreenMobile/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.reactnative.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone and iPad
      configs:
        debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
